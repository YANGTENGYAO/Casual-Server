        <h2 class="section-title">伺服器資訊</h2>
        <div class="server-card animated-card" id="serverCard" onclick="copyIP()">
            <div class="copy-success">✨ 已複製 IP 到剪貼簿！</div>
            <div class="info-row">
                <div class="info-item">
                    <div class="info-label">連線狀態</div>

                <div class="info-item">
                    <div class="info-label">當前版本</div>
                    <div class="info-value" id="version">查詢中...</div>
                </div>
                <div class="info-item">
                    <div class="info-label">在線人數</div>
                    <div class="info-value" id="players">0 / 0</div>
                </div>
            </div>
            <div class="ip-hint">伺服器 IP（點擊即可複製）</div>
            <div class="ip-display">
                <svg class="compass-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg>
